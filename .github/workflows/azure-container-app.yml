name: Deploy Doings Evidence MCP to Azure Container Apps

on:
  workflow_dispatch:
  push:
    branches: ["main"]

permissions:
  contents: read
  id-token: write

concurrency:
  group: doings-evidence-mcp-azure
  cancel-in-progress: false

env:
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
  AZURE_LOCATION: ${{ vars.AZURE_LOCATION || 'swedencentral' }}
  AZURE_CONTAINER_APP_NAME: ${{ vars.AZURE_CONTAINER_APP_NAME || 'doings-evidence-mcp' }}
  AZURE_CONTAINER_REGISTRY: ${{ vars.AZURE_CONTAINER_REGISTRY }}
  AZURE_CONTAINER_ENVIRONMENT: ${{ vars.AZURE_CONTAINER_ENVIRONMENT || 'doings-evidence-env' }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate required configuration
        shell: bash
        run: |
          test -n "$AZURE_RESOURCE_GROUP" || (echo "Missing repo variable AZURE_RESOURCE_GROUP" && exit 1)
          test -n "$AZURE_CONTAINER_REGISTRY" || (echo "Missing repo variable AZURE_CONTAINER_REGISTRY" && exit 1)
          test -n "${{ secrets.MCP_BEARER_TOKEN }}" || (echo "Missing repo secret MCP_BEARER_TOKEN" && exit 1)

      - name: Build TypeScript
        shell: bash
        run: |
          node --version
          npm --version
          npm config set registry https://registry.npmjs.org/
          npm config set loglevel verbose
          rm -f package-lock.json
          rm -rf node_modules
          npm install --package-lock-only --registry=https://registry.npmjs.org/ --no-audit --no-fund
          npm ci --registry=https://registry.npmjs.org/ --no-audit --no-fund
          npm run build

      - name: Deploy Azure infrastructure
        shell: bash
        run: |
          az group create --name "$AZURE_RESOURCE_GROUP" --location "$AZURE_LOCATION"
          az deployment group create \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --template-file infra/main.bicep \
            --parameters location="$AZURE_LOCATION" \
                         containerRegistryName="$AZURE_CONTAINER_REGISTRY" \
                         containerAppName="$AZURE_CONTAINER_APP_NAME" \
                         containerAppEnvironmentName="$AZURE_CONTAINER_ENVIRONMENT"

      - name: Log in to Azure Container Registry
        shell: bash
        run: az acr login --name "$AZURE_CONTAINER_REGISTRY"

      - name: Patch Dockerfile npm install commands
        shell: bash
        run: |
          sed -i 's/npm ci --omit=dev/npm install --omit=dev --registry=https:\/\/registry.npmjs.org\/ --no-audit --no-fund/g' Dockerfile
          sed -i 's/npm ci/npm install --registry=https:\/\/registry.npmjs.org\/ --no-audit --no-fund/g' Dockerfile
          cat Dockerfile

      - name: Build and push image
        shell: bash
        run: |
          IMAGE="$AZURE_CONTAINER_REGISTRY.azurecr.io/doings-evidence-mcp:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Configure container app secrets
        shell: bash
        run: |
          az containerapp secret set \
            --name "$AZURE_CONTAINER_APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --secrets \
              mcp-bearer-token="${{ secrets.MCP_BEARER_TOKEN }}" \
              ms-tenant-id="${{ secrets.MS_TENANT_ID }}" \
              ms-client-id="${{ secrets.MS_CLIENT_ID }}"

      - name: Deploy container app revision
        shell: bash
        run: |
          az containerapp update \
            --name "$AZURE_CONTAINER_APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --image "$IMAGE" \
            --set-env-vars \
              NODE_ENV=production \
              PORT=3000 \
              MCP_REQUIRE_AUTH=true \
              MCP_BEARER_TOKEN=secretref:mcp-bearer-token \
              MCP_PATH=/mcp \
              MS_TENANT_ID=secretref:ms-tenant-id \
              MS_CLIENT_ID=secretref:ms-client-id \
              MS_GRAPH_SCOPES="Files.Read.All Sites.Read.All offline_access"

      - name: Print endpoint
        shell: bash
        run: |
          FQDN=$(az containerapp show --name "$AZURE_CONTAINER_APP_NAME" --resource-group "$AZURE_RESOURCE_GROUP" --query properties.configuration.ingress.fqdn -o tsv)
          echo "MCP_BASE_URL=https://$FQDN" >> "$GITHUB_ENV"
          echo "MCP health: https://$FQDN/health"
          echo "MCP endpoint: https://$FQDN/mcp"

      - name: Smoke test remote MCP
        shell: bash
        env:
          MCP_BEARER_TOKEN: ${{ secrets.MCP_BEARER_TOKEN }}
        run: |
          npm run smoke:health
          npm run smoke:remote
